gzip on;
gzip_comp_level 6;
gzip_vary on;

upstream backend_servers {
    server backend:4000;  
    keepalive 64;
}

 
server {
    listen 80;
    server_name theopensourcehelper.tech www.theopensourcehelper.tech;

     
    return 301 https://$host$request_uri;
}

 
server {
    listen 443 ssl;
    server_name theopensourcehelper.tech www.theopensourcehelper.tech;

     
    ssl_certificate /etc/letsencrypt/live/theopensourcehelper.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theopensourcehelper.tech/privkey.pem;

     
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    error_page 502 /502.html;

    
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

     
    location /api/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}