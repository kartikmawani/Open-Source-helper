 services:
  
  nginx:
    image: nginx:alpine
    container_name: helper-proxy
    ports:
      - "80:80"
    volumes:
       -./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    container_name: helper-api
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/opensource-db
      - REDIS_HOST=redis
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: helper-ui
     
    environment:
      - VITE_API_URL=/api  
  mongodb:
    image: mongo:7.0
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
    volumes:
      - mongo-data:/data/db
 
  redis:
    image: redis:alpine

volumes:
  mongo-data: